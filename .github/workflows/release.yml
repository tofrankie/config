name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/*.md'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Automatic Versioning and Publishing
        id: release
        run: |
          # Check whether there are any unconsumed changesets
          if [ -d ".changeset" ] && [ "$(ls -A .changeset/*.md 2>/dev/null)" ]; then
            echo "Changesets found. Performing automatic versioning..."

            pnpm install --frozen-lockfile

            # 1. Run versioning (including your custom changelog formatting)
            pnpm release:version

            # 2. Push the versioned changes back to main
            #    This lets you skip the "manual PR merge" step in a single-branch workflow
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: version packages [skip ci]"
            git push origin main
          else
            echo "No changesets to process."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: changesets/action@v1
        with:
          # This step only handles publishing (tags + GitHub Release)
          # because the versioning step was already executed above
          publish: pnpm release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.TOFRANKIE_SCOPE_NPM_TOKEN }}
